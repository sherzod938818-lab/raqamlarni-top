<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Raqamlarni Top</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  font-family: 'Segoe UI', sans-serif;
  background:#1a1a2e;
  color:#fff;
  width:100%;
  height:100%;
  overflow:hidden;
}

.screen {
  display:none;
  width:100%;
  height:100vh;
  padding:12px 16px;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.screen.active { display:flex; }

h1 { font-size:20px; margin-bottom:6px; text-align:center; }
.sub { color:#aaa; font-size:12px; margin-bottom:10px; text-align:center; }

.btn {
  background:linear-gradient(135deg,#6c63ff,#3f3d9e);
  color:#fff; border:none;
  padding:13px;
  border-radius:12px;
  font-size:15px;
  width:100%;
  margin:5px 0;
}

.btn:active { transform:scale(0.97); }

.input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #6c63ff44;
  background:#16213e;
  color:#fff;
  text-align:center;
  letter-spacing:3px;
}

/* ROOM LIST */
.room-list {
  width:100%;
  max-height:45vh;
  overflow-y:auto;
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.room-item {
  background:#16213e;
  padding:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.room-item button {
  background:#6c63ff;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  color:#fff;
}

/* GAME UI (original saqlangan) */
.chat-box {
  width:100%;
  flex:1;
  background:#16213e;
  border-radius:12px;
  overflow-y:auto;
  padding:10px;
  margin:6px 0;
}

.msg { padding:7px 11px; border-radius:10px; margin-bottom:6px; }

.msg.me { background:#6c63ff; align-self:flex-end; }
.msg.opponent { background:#0f3460; }

.number-display { display:flex; gap:8px; margin:6px 0; }

.num-box {
  width:52px; height:54px;
  background:#16213e;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  border:2px solid #ffffff11;
}

.num-box.filled { border-color:#6c63ff; }

.numpad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  width:100%;
}

.numpad-btn {
  height:50px;
  background:#16213e;
  border-radius:10px;
  color:#fff;
  border:none;
}

.numpad-btn.confirm {
  grid-column:span 3;
  background:#6c63ff;
}

.turn-bar {
  font-size:12px;
  color:#888;
}
.turn-bar.my-turn { color:#6c63ff; font-weight:bold; }

#confetti-canvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti-canvas"></canvas>

<!-- ================= LOBBY ================= -->
<div class="screen active" id="screen-lobby">
  <h1>🎮 Raqamlarni Top</h1>
  <p class="sub">Xona yarating yoki mavjud xonaga qo‘shiling</p>

  <button class="btn" onclick="createRoom()">➕ Xona yaratish</button>

  <input class="input" id="join-code" placeholder="Xona kodi">

  <button class="btn" onclick="joinRoom()">🚪 Qo‘shilish</button>

  <h3 style="margin-top:10px;font-size:14px">📋 Aktiv xonalar</h3>
  <div class="room-list" id="room-list"></div>
</div>

<!-- ================= WAIT ================= -->
<div class="screen" id="screen-wait">
  <h1>⏳ Kutish</h1>
  <p class="sub">Xona: <span id="room-code"></span></p>
</div>

<!-- ================= CHOOSE ================= -->
<div class="screen" id="screen-choose">
  <h1>🔢 Maxfiy son</h1>

  <div class="number-display">
    <div class="num-box" id="nb0">_</div>
    <div class="num-box" id="nb1">_</div>
    <div class="num-box" id="nb2">_</div>
    <div class="num-box" id="nb3">_</div>
  </div>

  <div class="numpad">
    <button class="numpad-btn" onclick="num('1')">1</button>
    <button class="numpad-btn" onclick="num('2')">2</button>
    <button class="numpad-btn" onclick="num('3')">3</button>
    <button class="numpad-btn" onclick="num('4')">4</button>
    <button class="numpad-btn" onclick="num('5')">5</button>
    <button class="numpad-btn" onclick="num('6')">6</button>
    <button class="numpad-btn" onclick="num('7')">7</button>
    <button class="numpad-btn" onclick="num('8')">8</button>
    <button class="numpad-btn" onclick="num('9')">9</button>
    <button class="numpad-btn" onclick="del()">⌫</button>
    <button class="numpad-btn" onclick="num('0')">0</button>
    <button class="numpad-btn confirm" onclick="confirm()">Tasdiqlash</button>
  </div>
</div>

<!-- ================= GAME ================= -->
<div class="screen" id="screen-game">
  <span id="turn" class="turn-bar">...</span>

  <div class="chat-box" id="chat"></div>

  <div class="number-display">
    <div class="num-box" id="g0">_</div>
    <div class="num-box" id="g1">_</div>
    <div class="num-box" id="g2">_</div>
    <div class="num-box" id="g3">_</div>
  </div>

  <div class="numpad">
    <button class="numpad-btn" onclick="g('1')">1</button>
    <button class="numpad-btn" onclick="g('2')">2</button>
    <button class="numpad-btn" onclick="g('3')">3</button>
    <button class="numpad-btn" onclick="g('4')">4</button>
    <button class="numpad-btn" onclick="g('5')">5</button>
    <button class="numpad-btn" onclick="g('6')">6</button>
    <button class="numpad-btn" onclick="g('7')">7</button>
    <button class="numpad-btn" onclick="g('8')">8</button>
    <button class="numpad-btn" onclick="g('9')">9</button>
    <button class="numpad-btn" onclick="gdel()">⌫</button>
    <button class="numpad-btn" onclick="g('0')">0</button>
    <button class="numpad-btn confirm" onclick="send()">Yuborish</button>
  </div>
</div>

<script>
const WS_URL = location.hostname === 'localhost'
  ? 'ws://localhost:3000'
  : 'wss://raqamlarni-top.onrender.com';

const tg = window.Telegram.WebApp;
tg.expand();

let ws, roomId, playerIndex;
let choose=[], guess=[];
let myTurn=false;

const username = tg.initDataUnsafe?.user?.first_name || "Player";

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function connect(cb){
  ws = new WebSocket(WS_URL);
  ws.onopen = cb;
  ws.onmessage = e => handle(JSON.parse(e.data));
}

function createRoom(){
  connect(()=>ws.send(JSON.stringify({type:'create_room', username})));
}

function joinRoom(){
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  connect(()=>ws.send(JSON.stringify({type:'join_room', roomId:code, username})));
}

function handle(d){

  if(d.type==='rooms_list'){
    const box=document.getElementById('room-list');
    box.innerHTML='';
    d.rooms.forEach(r=>{
      const div=document.createElement('div');
      div.className='room-item';
      div.innerHTML=`<span>${r.id} (${r.count}/2)</span>`;
      const btn=document.createElement('button');
      btn.innerText='Join';
      btn.onclick=()=>joinRoomById(r.id);
      div.appendChild(btn);
      box.appendChild(div);
    });
  }

  if(d.type==='room_created'){
    roomId=d.roomId;
    playerIndex=0;
    document.getElementById('room-code').innerText=roomId;
    show('screen-wait');
  }

  if(d.type==='room_joined'){
    roomId=d.roomId;
    playerIndex=1;
    show('screen-choose');
  }

  if(d.type==='game_start'){
    myTurn=d.yourTurn;
    show('screen-game');
    updateTurn();
  }

  if(d.type==='guess_result'){
    myTurn=d.yourTurn;
    updateTurn();
    addChat(d);
  }
}

function joinRoomById(id){
  connect(()=>ws.send(JSON.stringify({type:'join_room', roomId:id, username})));
}

/* choose number */
function num(n){ if(choose.length<4){choose.push(n); render();}}
function del(){choose.pop(); render();}
function render(){
  for(let i=0;i<4;i++){
    const el=document.getElementById('nb'+i);
    el.innerText=choose[i]||'_';
  }
}
function confirm(){
  ws.send(JSON.stringify({type:'set_number', number:choose.join('')}));
}

/* guess */
function g(n){ if(myTurn && guess.length<4){guess.push(n); renderG();}}
function gdel(){guess.pop(); renderG();}
function renderG(){
  for(let i=0;i<4;i++){
    document.getElementById('g'+i).innerText=guess[i]||'_';
  }
}
function send(){
  ws.send(JSON.stringify({type:'guess', number:guess.join('')}));
}

/* UI */
function updateTurn(){
  document.getElementById('turn').innerText =
    myTurn ? "Sizning navbat" : "Raqib navbati";
}

function addChat(d){
  const c=document.getElementById('chat');
  const div=document.createElement('div');
  div.className='msg';
  div.innerText=`Guess: ${d.guess}`;
  c.appendChild(div);
}
</script>

</body>
</html>

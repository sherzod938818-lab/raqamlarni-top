<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raqamlarni Top</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .screen { display: none; width: 100%; max-width: 400px; padding: 20px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  h1 { font-size: 28px; margin-bottom: 10px; text-align: center; }
  p { color: #aaa; text-align: center; margin-bottom: 20px; }

  .btn {
    background: linear-gradient(135deg, #6c63ff, #3f3d9e);
    color: #fff;
    border: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    margin: 8px;
    width: 100%;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }

  /* Animatsiya ekrani */
  .anim-box {
    display: flex;
    gap: 12px;
    margin: 30px 0;
  }
  .digit-slot {
    width: 60px;
    height: 80px;
    background: #16213e;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: bold;
    color: #6c63ff;
    border: 2px solid #6c63ff33;
    animation: flip 0.5s infinite alternate;
  }
  .digit-slot:nth-child(2) { animation-delay: 0.1s; }
  .digit-slot:nth-child(3) { animation-delay: 0.2s; }
  .digit-slot:nth-child(4) { animation-delay: 0.3s; }
  @keyframes flip {
    from { transform: scaleY(1); color: #6c63ff; }
    to { transform: scaleY(0.85); color: #ff6584; }
  }

  /* Son tanlash */
  .number-display {
    display: flex;
    gap: 10px;
    margin: 20px 0;
  }
  .num-box {
    width: 60px;
    height: 70px;
    background: #16213e;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    color: #fff;
    border: 2px solid #6c63ff55;
  }
  .num-box.filled { border-color: #6c63ff; color: #6c63ff; }

  /* Numepad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 280px;
    margin: 10px 0;
  }
  .numpad-btn {
    background: #16213e;
    color: #fff;
    border: none;
    padding: 18px;
    border-radius: 12px;
    font-size: 22px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .numpad-btn:active { background: #6c63ff; }
  .numpad-btn.del { background: #2a1a2e; color: #ff6584; }
  .numpad-btn.confirm { background: #6c63ff; grid-column: span 3; padding: 14px; font-size: 16px; }

  /* Chat ekrani */
  .chat-box {
    width: 100%;
    height: 320px;
    background: #16213e;
    border-radius: 14px;
    overflow-y: auto;
    padding: 12px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg {
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 85%;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg.me {
    background: #6c63ff;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .msg.opponent {
    background: #0f3460;
    align-self: flex-start;
    border-bottom-left-radius: 2px;
  }
  .msg .result-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .result-cell {
    width: 30px;
    height: 34px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
  }
  .result-cell.open { background: rgba(255,255,255,0.35); }

  .turn-indicator {
    text-align: center;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
  }
  .turn-indicator.my-turn { color: #6c63ff; font-weight: bold; }

  /* G'alaba / Yutqizish */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
  .result-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 998;
    flex-direction: column;
  }
  .result-overlay h2 { font-size: 36px; margin-bottom: 16px; }
  .result-overlay .pieces {
    font-size: 48px;
    animation: scatter 1s forwards;
  }
  @keyframes scatter {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(3) rotate(20deg); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- EKRAN 1: Do'st tanlash -->
<div class="screen active" id="screen-invite">
  <h1>🎮 Raqamlarni Top</h1>
  <p>Do'stingizni tanlang va o'yinga taklif qiling!</p>
  <button class="btn" onclick="inviteFriend()">📨 Do'stni taklif qilish</button>
  <div style="margin-top:20px; color:#555; font-size:13px;">yoki</div>
  <input id="room-input" placeholder="Xona kodini kiriting" style="
    margin-top:14px; padding:12px; border-radius:10px;
    background:#16213e; color:#fff; border:1px solid #6c63ff55;
    width:100%; font-size:15px; text-align:center;
  ">
  <button class="btn" onclick="joinRoom()" style="margin-top:8px;">🚪 Xonaga kirish</button>
</div>

<!-- EKRAN 2: Kutish -->
<div class="screen" id="screen-wait">
  <h1>⏳ Raqibni kuting</h1>
  <p>Do'stingiz ulanishini kutmoqdasiz...</p>
  <div class="anim-box">
    <div class="digit-slot" id="d1">?</div>
    <div class="digit-slot" id="d2">?</div>
    <div class="digit-slot" id="d3">?</div>
    <div class="digit-slot" id="d4">?</div>
  </div>
  <p style="font-size:13px;">Xona kodi: <strong id="room-code-display" style="color:#6c63ff"></strong></p>
</div>

<!-- EKRAN 3: Son tanlash -->
<div class="screen" id="screen-choose">
  <h1>🔢 Sonni tanlang</h1>
  <p>4 xonali maxfiy sonni kiriting</p>
  <div class="number-display">
    <div class="num-box" id="nb0">_</div>
    <div class="num-box" id="nb1">_</div>
    <div class="num-box" id="nb2">_</div>
    <div class="num-box" id="nb3">_</div>
  </div>
  <div class="numpad">
    <button class="numpad-btn" onclick="numPress('1')">1</button>
    <button class="numpad-btn" onclick="numPress('2')">2</button>
    <button class="numpad-btn" onclick="numPress('3')">3</button>
    <button class="numpad-btn" onclick="numPress('4')">4</button>
    <button class="numpad-btn" onclick="numPress('5')">5</button>
    <button class="numpad-btn" onclick="numPress('6')">6</button>
    <button class="numpad-btn" onclick="numPress('7')">7</button>
    <button class="numpad-btn" onclick="numPress('8')">8</button>
    <button class="numpad-btn" onclick="numPress('9')">9</button>
    <button class="numpad-btn del" onclick="numDel()">⌫</button>
    <button class="numpad-btn" onclick="numPress('0')">0</button>
    <button class="numpad-btn confirm" onclick="confirmNumber()">✅ Tasdiqlash</button>
  </div>
</div>

<!-- EKRAN 4: O'yin -->
<div class="screen" id="screen-game">
  <h1 style="font-size:20px;">🕵️ Raqamni top!</h1>
  <div class="turn-indicator" id="turn-text">...</div>
  <div class="chat-box" id="chat-box"></div>
  <div class="number-display" style="margin:8px 0">
    <div class="num-box" id="gb0">_</div>
    <div class="num-box" id="gb1">_</div>
    <div class="num-box" id="gb2">_</div>
    <div class="num-box" id="gb3">_</div>
  </div>
  <div class="numpad">
    <button class="numpad-btn" onclick="guessPress('1')">1</button>
    <button class="numpad-btn" onclick="guessPress('2')">2</button>
    <button class="numpad-btn" onclick="guessPress('3')">3</button>
    <button class="numpad-btn" onclick="guessPress('4')">4</button>
    <button class="numpad-btn" onclick="guessPress('5')">5</button>
    <button class="numpad-btn" onclick="guessPress('6')">6</button>
    <button class="numpad-btn" onclick="guessPress('7')">7</button>
    <button class="numpad-btn" onclick="guessPress('8')">8</button>
    <button class="numpad-btn" onclick="guessPress('9')">9</button>
    <button class="numpad-btn del" onclick="guessDel()">⌫</button>
    <button class="numpad-btn" onclick="guessPress('0')">0</button>
    <button class="numpad-btn confirm" onclick="sendGuess()">🔍 Taxmin qilish</button>
  </div>
</div>

<script>
const WS_URL = 'wss://raqamlarni-top.onrender.com';
const tg = window.Telegram.WebApp;
tg.expand();

let ws, roomId, playerIndex, myNumber, guessBuffer = [], chooseBuffer = [];
let myTurn = false;
const username = tg.initDataUnsafe?.user?.first_name || 'O\'yinchi';

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function connect(onOpen) {
  ws = new WebSocket(WS_URL);
  ws.onopen = onOpen;
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
  ws.onerror = () => alert('Server bilan ulanishda xatolik!');
}

function inviteFriend() {
  connect(() => {
    ws.send(JSON.stringify({ type: 'create_room', username }));
  });
}

function joinRoom() {
  const code = document.getElementById('room-input').value.trim().toUpperCase();
  if (!code) return alert('Xona kodini kiriting!');
  connect(() => {
    ws.send(JSON.stringify({ type: 'join_room', roomId: code, username }));
  });
}

function handleMessage(data) {
  if (data.type === 'room_created') {
    roomId = data.roomId;
    playerIndex = data.playerIndex;
    document.getElementById('room-code-display').textContent = roomId;
    showScreen('screen-wait');
    startDigitAnim();
    // Telegram orqali do'stga yuborish
    const shareUrl = `https://t.me/raqamlarniTOPbot?start=${roomId}`;
    tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=Men+bilan+Raqamlarni+Top+o'ynaylik!`);
  }
  if (data.type === 'room_joined') {
    roomId = data.roomId;
    playerIndex = data.playerIndex;
  }
  if (data.type === 'error') {
    alert(data.msg);
  }
  if (data.type === 'opponent_joined') {
    showScreen('screen-choose');
  }
  if (data.type === 'number_set') {
    // Son saqlandi, raqibni kutamiz
  }
  if (data.type === 'game_start') {
    myTurn = data.yourTurn;
    showScreen('screen-game');
    updateTurnText();
  }
  if (data.type === 'guess_result') {
    addChatMessage(data);
    myTurn = data.yourTurn;
    updateTurnText();
    if (data.won) {
      if (data.guesserIdx === playerIndex) {
        showWin();
      } else {
        showLose();
      }
    }
    guessBuffer = [];
    updateGuessDisplay();
  }
  if (data.type === 'opponent_left') {
    alert('Raqibingiz o\'yindan chiqdi!');
    location.reload();
  }
}

// Digit animatsiya
function startDigitAnim() {
  const slots = ['d1','d2','d3','d4'];
  slots.forEach(id => {
    setInterval(() => {
      document.getElementById(id).textContent = Math.floor(Math.random()*10);
    }, 200 + Math.random()*300);
  });
}

// Son tanlash
function numPress(n) {
  if (chooseBuffer.length >= 4) return;
  chooseBuffer.push(n);
  updateChooseDisplay();
}
function numDel() {
  chooseBuffer.pop();
  updateChooseDisplay();
}
function updateChooseDisplay() {
  for (let i = 0; i < 4; i++) {
    const box = document.getElementById('nb'+i);
    box.textContent = chooseBuffer[i] || '_';
    box.className = 'num-box' + (chooseBuffer[i] ? ' filled' : '');
  }
}
function confirmNumber() {
  if (chooseBuffer.length < 4) return alert('4 ta raqam kiriting!');
  myNumber = chooseBuffer.join('');
  ws.send(JSON.stringify({ type: 'set_number', number: myNumber }));
  // Raqibni kutish xabari
  for (let i=0;i<4;i++) {
    const box = document.getElementById('nb'+i);
    box.style.borderColor = '#00c896';
  }
  alert('Soniz saqlandi! Raqibingiz sonini kutmoqda...');
}

// Taxmin
function guessPress(n) {
  if (!myTurn) return;
  if (guessBuffer.length >= 4) return;
  guessBuffer.push(n);
  updateGuessDisplay();
}
function guessDel() {
  guessBuffer.pop();
  updateGuessDisplay();
}
function updateGuessDisplay() {
  for (let i = 0; i < 4; i++) {
    const box = document.getElementById('gb'+i);
    box.textContent = guessBuffer[i] || '_';
    box.className = 'num-box' + (guessBuffer[i] ? ' filled' : '');
  }
}
function sendGuess() {
  if (!myTurn) return alert('Navbat sizniki emas!');
  if (guessBuffer.length < 4) return alert('4 ta raqam kiriting!');
  ws.send(JSON.stringify({ type: 'guess', number: guessBuffer.join('') }));
}

function updateTurnText() {
  const el = document.getElementById('turn-text');
  el.textContent = myTurn ? '✨ Sizning navbatingiz!' : '⏳ Raqibingiz o\'ylayapti...';
  el.className = 'turn-indicator' + (myTurn ? ' my-turn' : '');
}

function addChatMessage(data) {
  const chat = document.getElementById('chat-box');
  const isMe = data.guesserIdx === playerIndex;
  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'opponent');

  const resultRow = document.createElement('div');
  resultRow.className = 'result-row';
  data.result.forEach((r, i) => {
    const cell = document.createElement('div');
    cell.className = 'result-cell' + (r !== '_' ? ' open' : '');
    cell.textContent = r === '_' ? data.guess[i] : r;
    resultRow.appendChild(cell);
  });

  div.innerHTML = `<div style="font-size:12px;opacity:0.7;margin-bottom:4px">${isMe ? 'Siz' : 'Raqib'}: ${data.guess}</div>`;
  div.appendChild(resultRow);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// G'alaba
function showWin() {
  const overlay = document.createElement('div');
  overlay.className = 'result-overlay';
  overlay.innerHTML = '<h2>🎉 G\'aldingiz!</h2><button class="btn" onclick="location.reload()" style="width:200px">Qayta o\'ynash</button>';
  document.body.appendChild(overlay);
  startConfetti();
}

// Yutqizish
function showLose() {
  const overlay = document.createElement('div');
  overlay.className = 'result-overlay';
  overlay.innerHTML = '<div class="pieces">💔</div><h2 style="margin-top:16px">Yutqizdingiz!</h2><button class="btn" onclick="location.reload()" style="width:200px;margin-top:16px">Qayta o\'ynash</button>';
  document.body.appendChild(overlay);
}

// Confetti
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    r: Math.random() * 8 + 4,
    color: `hsl(${Math.random()*360},90%,60%)`,
    speed: Math.random() * 4 + 2,
    angle: Math.random() * 360
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
      p.y += p.speed;
      p.x += Math.sin(p.angle * Math.PI/180);
      p.angle += 2;
      if (p.y > canvas.height) p.y = -10;
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
